name: "DAST Security — Scan, Remediate & Gate"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Global env vars
# ─────────────────────────────────────────────────────────────────────────────
env:
  PYTHONUTF8: "1"          # Force UTF-8 output on all platforms

# ─────────────────────────────────────────────────────────────────────────────
# Permissions required for PR creation, comments, and issue creation
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write          # push remediation branch
  pull-requests: write     # create PR + post comments
  issues: write            # create GitHub Issues for findings
  security-events: write   # (optional) upload SARIF if added later

jobs:
  dast-security:
    name: "DAST · Scan · Remediate · Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for branch create
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: automated_test/requirements.txt

      # ── 3. Install Python Dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automated_test/requirements.txt

      # ── 4. Configure Git identity (for remediation commits) ───────────────
      - name: Configure Git identity
        run: |
          git config --global user.name  "DAST Security Bot"
          git config --global user.email "dast-bot@campus-mentor.ci"

      # ── 5. Endpoint Discovery ─────────────────────────────────────────────
      - name: Endpoint Discovery
        id: discovery
        run: |
          python automated_test/dast_runner.py --discover-only 2>&1 | tee /tmp/discovery.log
          echo "discovery_log<<EOF" >> $GITHUB_OUTPUT
          head -30 /tmp/discovery.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 6. DAST Execution + Secret Scan ──────────────────────────────────
      - name: DAST Execution & Secret Scan
        id: dast
        run: |
          python automated_test/dast_runner.py --run-tests 2>&1 | tee /tmp/dast.log
          # Capture exit code (gate result stored separately by security-gate step)
          echo "dast_exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true   # don't fail here — security gate step decides

      # ── 7. Generate Reports ──────────────────────────────────────────────
      - name: Generate Security Reports
        if: always()
        run: |
          # Reports are already generated by dast_runner.py --run-tests above.
          # Verify they exist:
          ls -lh automated_test/security_test_report.xlsx || true
          ls -lh automated_test/report.json || true
          ls -lh automated_test/report.md   || true

      # ── 8. Upload Artifacts (30-day retention) ───────────────────────────
      - name: Upload Security Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dast-reports-${{ github.run_number }}
          path: |
            automated_test/security_test_report.xlsx
            automated_test/report.json
            automated_test/report.md
            automated_test/SECRET_ROTATION_REQUIRED.md
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Auto-Remediation + GitHub PR (push/main only) ─────────────────
      - name: Apply Remediations & Create PR
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python automated_test/dast_runner.py 2>&1 | tee /tmp/full_run.log
        continue-on-error: true   # don't block on GitHub API errors

      # ── 10. Post PR Comment (on pull_request events) ─────────────────────
      - name: Post PR Security Summary Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let summary = '### 🔐 Security Scan Results\n\n';
            try {
              const report = JSON.parse(fs.readFileSync('automated_test/report.json', 'utf8'));
              const s = report.summary;
              summary += `| | |\n|---|---|\n`;
              summary += `| **Endpoints Tested** | ${s.endpoints_discovered} |\n`;
              summary += `| **Tests Executed** | ${s.total_tests} |\n`;
              summary += `| **Passed ✅** | ${s.passed} |\n\n`;
              summary += `| Severity | Count |\n|---|---|\n`;
              summary += `| 🔴 Critical | ${s.critical} |\n`;
              summary += `| 🟠 High | ${s.high} |\n`;
              summary += `| 🟡 Medium | ${s.medium} |\n`;
              summary += `| 🔵 Low | ${s.low} |\n\n`;
              // List findings
              const failed = report.findings.filter(f => f.status === 'FAIL');
              if (failed.length > 0) {
                summary += '**Findings:**\n';
                failed.forEach(f => {
                  summary += `- [\`${f.id}\`] **${f.severity}** — ${f.title}\n`;
                });
                summary += '\n';
              }
              summary += `📎 **Report Artifact:** \`security_test_report.xlsx\` (see Actions artifacts)\n\n`;
              summary += `---\n*Posted by DAST Security Pipeline · Run #${{ github.run_number }}*`;
            } catch(e) {
              summary += `_Report not available: ${e.message}_`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      # ── 11. Security Gate ─────────────────────────────────────────────────
      - name: Security Gate
        id: gate
        run: |
          python - <<'PYEOF'
          import json, sys, os

          report_path = "automated_test/report.json"
          if not os.path.exists(report_path):
              print("⚠️  report.json not found — gate skipped")
              sys.exit(0)

          with open(report_path) as f:
              report = json.load(f)

          findings = report.get("findings", [])
          s = report.get("summary", {})
          failures = []

          # Rule 1: Any Critical finding
          crit = [f for f in findings if f["severity"] == "Critical" and f["status"] == "FAIL"]
          if crit:
              failures.append(f"CRITICAL findings: {[f['id'] for f in crit]}")

          # Rule 2: More than 3 High findings
          highs = [f for f in findings if f["severity"] == "High" and f["status"] == "FAIL"]
          if len(highs) > 3:
              failures.append(f"More than 3 HIGH findings: {len(highs)} found")

          # Rule 3: Authentication bypass (TC-SEC-003)
          authn = next((f for f in findings if f["id"] == "TC-SEC-003" and f["status"] == "FAIL"), None)
          if authn:
              failures.append("Authentication bypass detected: TC-SEC-003 FAIL")

          # Rule 4: Authorization bypass (TC-SEC-006 Critical)
          authz = next(
              (f for f in findings if f["id"] == "TC-SEC-006" and f["severity"] == "Critical" and f["status"] == "FAIL"),
              None
          )
          if authz:
              failures.append("Authorization bypass detected: TC-SEC-006 Critical FAIL")

          if failures:
              print("❌ SECURITY GATE FAILED:")
              for r in failures:
                  print(f"   • {r}")
              print(f"\nSummary: {s.get('critical',0)} Critical | {s.get('high',0)} High | "
                    f"{s.get('medium',0)} Medium | {s.get('low',0)} Low")
              sys.exit(1)
          else:
              print("✅ SECURITY GATE PASSED")
              print(f"   Tests: {s.get('total_tests',0)} | Passed: {s.get('passed',0)} | "
                    f"Critical: {s.get('critical',0)} | High: {s.get('high',0)}")
          PYEOF

      # ── 12. Job Summary ───────────────────────────────────────────────────
      - name: Write Job Summary
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os

          report_path = "automated_test/report.json"
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          lines = ["## 🛡️ DAST Security Scan Results\n"]

          if os.path.exists(report_path):
              with open(report_path) as f:
                  report = json.load(f)
              s = report.get("summary", {})
              lines += [
                  "| Metric | Value |",
                  "|--------|-------|",
                  f"| Endpoints Discovered | {s.get('endpoints_discovered',0)} |",
                  f"| Total Tests | {s.get('total_tests',0)} |",
                  f"| Passed ✅ | {s.get('passed',0)} |",
                  f"| Failed ❌ | {s.get('failed',0)} |",
                  f"| 🔴 Critical | {s.get('critical',0)} |",
                  f"| 🟠 High | {s.get('high',0)} |",
                  f"| 🟡 Medium | {s.get('medium',0)} |",
                  f"| 🔵 Low | {s.get('low',0)} |",
                  "",
                  "### Findings",
                  "",
                  "| ID | Severity | Category | Status | Title |",
                  "|----|----------|----------|--------|-------|",
              ]
              for f in report.get("findings", []):
                  icon = {"Critical":"🔴","High":"🟠","Medium":"🟡","Low":"🔵"}.get(f["severity"],"⚪")
                  si   = "✅" if f["status"] == "PASS" else "❌"
                  lines.append(f"| {f['id']} | {icon} {f['severity']} | {f['category']} | {si} {f['status']} | {f['title']} |")
          else:
              lines.append("_report.json not found_")

          with open(summary_file, "a") as sf:
              sf.write("\n".join(lines) + "\n")
          PYEOF
