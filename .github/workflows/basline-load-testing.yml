# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Basline Load Testing Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Basline Load Testing
run-name: Basline Load Testing

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  basline-load-testing:
    name: Run Baseline Load Testing with k6
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'test-cases-reports/baseline Load testing/package-lock.json'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create .env file from secrets
        run: |
          echo "GROQ_KEY=${{ secrets.GROQ_KEY || secrets.GROQ_API_KEY }}" >> .env
          echo "FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}" >> .env
          echo "FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}" >> .env
          echo "FIREBASE_WEB_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web App
        run: flutter build web --release

      - name: Install Load Test dependencies
        working-directory: test-cases-reports/baseline Load testing
        run: npm install --no-audit --no-fund

      - name: Run Baseline Load Tests
        working-directory: test-cases-reports/baseline Load testing
        run: node run_load_tests.js

      - name: Upload Load Test Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-load-test-report
          path: test-cases-reports/baseline Load testing/baseline_load_test_report.xlsx
          if-no-files-found: ignore
          retention-days: 14

      - name: Generate Job Summary Chart
        if: always()
        run: |
          SUMMARY_JSON="test-cases-reports/baseline Load testing/load_test_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            TOTAL=$(jq -r '.total' "$SUMMARY_JSON")
            PASSED=$(jq -r '.passed' "$SUMMARY_JSON")
            FAILED=$(jq -r '.failed' "$SUMMARY_JSON")
            PASSRATE=$(jq -r '.passRate' "$SUMMARY_JSON")
            DURATION=$(jq -r '.duration' "$SUMMARY_JSON")
            STATUS=$(jq -r '.status' "$SUMMARY_JSON")
            
            echo "## 📊 Baseline Load Testing Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Requests Success vs Failure" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed ✅\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed ❌\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔄 Execution Flow" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "graph TD" >> $GITHUB_STEP_SUMMARY
            echo "    Start([Start Run]) --> Checkout[Checkout Repo]" >> $GITHUB_STEP_SUMMARY
            echo "    Checkout --> SetupEnv[Setup Node & k6]" >> $GITHUB_STEP_SUMMARY
            echo "    SetupEnv --> Build[Build Web Application]" >> $GITHUB_STEP_SUMMARY
            echo "    Build --> RunLoad[Run k6 Load Tests]" >> $GITHUB_STEP_SUMMARY
            echo "    RunLoad --> Report[Generate Excel Report]" >> $GITHUB_STEP_SUMMARY
            echo "    Report --> UploadReport[Upload Load Test Report]" >> $GITHUB_STEP_SUMMARY
            echo "    UploadReport --> End([End Run])" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Requests** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Passed ✅** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Failed ❌** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate 📈** | $PASSRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Avg Response Time ⏱️** | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **Overall Verdict 🚀** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Load test summary JSON not found. Skip summary generation." >> $GITHUB_STEP_SUMMARY
          fi
