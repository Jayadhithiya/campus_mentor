name: Deploy Mobile App
run-name: Deploy Mobile App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  deploy-apk:
    name: Build & Deploy APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 4. Install Flutter SDK
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 5. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 6. Confirm Flutter is available
      - name: Flutter version
        run: flutter --version

      # 7. Install Dart/Flutter packages
      - name: flutter pub get
        run: flutter pub get

      # 8. Build Release APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 9. Upload APK as Workflow Artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 10. Create and Deploy to GitHub Release (on tag push or manual release request)
      - name: Deploy to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
