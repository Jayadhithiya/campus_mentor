# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Selenium Testing Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Selenium Testing
run-name: Selenium Testing

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  selenium-test:
    name: Run Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web App
        run: flutter build web --release

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: test-cases-reports/selinium-test/package-lock.json

      - name: Install Selenium test dependencies
        working-directory: test-cases-reports/selinium-test
        run: npm install --no-audit --no-fund

      - name: Run Selenium Tests
        working-directory: test-cases-reports/selinium-test
        run: node run_web_tests.js

      - name: Upload Selenium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-excel-report
          path: test-cases-reports/selinium-test/selenium_web_report.xlsx
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Selenium screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: test-cases-reports/selinium-test/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate Job Summary Chart
        if: always()
        run: |
          SUMMARY_JSON="test-cases-reports/selinium-test/selenium_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            TOTAL=$(jq -r '.total' "$SUMMARY_JSON")
            PASSED=$(jq -r '.passed' "$SUMMARY_JSON")
            FAILED=$(jq -r '.failed' "$SUMMARY_JSON")
            PASSRATE=$(jq -r '.passRate' "$SUMMARY_JSON")
            DURATION=$(jq -r '.duration' "$SUMMARY_JSON")
            STATUS=$(jq -r '.status' "$SUMMARY_JSON")
            
            echo "## 📊 Selenium Web Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Pass vs Fail Rate ($PASSRATE%)" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed ✅\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed ❌\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔄 Execution Flow" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "graph TD" >> $GITHUB_STEP_SUMMARY
            echo "    Start([Start Run]) --> Checkout[Checkout Repo]" >> $GITHUB_STEP_SUMMARY
            echo "    Checkout --> SetupEnv[Setup Node & Flutter SDK]" >> $GITHUB_STEP_SUMMARY
            echo "    SetupEnv --> Build[Build Web Application]" >> $GITHUB_STEP_SUMMARY
            echo "    Build --> RunTests[Run Webdriver E2E Tests]" >> $GITHUB_STEP_SUMMARY
            echo "    RunTests --> ParseResults[Parse Results & Summary]" >> $GITHUB_STEP_SUMMARY
            echo "    ParseResults --> UploadExcel[Upload Excel Report]" >> $GITHUB_STEP_SUMMARY
            echo "    ParseResults --> UploadScreenshots[Upload Screenshots]" >> $GITHUB_STEP_SUMMARY
            echo "    UploadExcel --> End([End Run])" >> $GITHUB_STEP_SUMMARY
            echo "    UploadScreenshots --> End" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Test Cases** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Passed ✅** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Failed ❌** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate 📈** | $PASSRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Duration ⏱️** | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Deployability Status 🚀** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Selenium test summary JSON not found. Skip summary generation." >> $GITHUB_STEP_SUMMARY
          fi
