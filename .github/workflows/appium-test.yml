# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Standalone Appium Test Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Appium Test

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  appium-test:
    name: Run Appium Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COLLABORATOR_TOKEN || secrets.GITHUB_TOKEN }}

      # 2. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Set up Java (required for Android SDK/Gradle and Emulator)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6. Install Flutter dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 7. Build Flutter Debug APK
      - name: Build Android Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # 8. Copy built APK to test-cases-reports/appium-test/apk/
      - name: Prepare APK directory for Appium
        run: |
          mkdir -p test-cases-reports/appium-test/apk
          cp build/app/outputs/flutter-apk/app-debug.apk test-cases-reports/appium-test/apk/app-debug.apk

      # 9. Enable KVM (Kernel-based Virtual Machine) for Emulator acceleration
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 10. Set up Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: test-cases-reports/appium-test/package-lock.json

      # 11. Install npm packages for Appium test suite
      - name: Install Appium test dependencies
        working-directory: test-cases-reports/appium-test
        run: npm install --no-audit --no-fund

      # 12. Ensure Appium UiAutomator2 driver is installed
      - name: Install Appium UIAutomator2 Driver
        working-directory: test-cases-reports/appium-test
        run: npx appium driver install uiautomator2 2>&1 | grep -v "already installed" || true

      # 13. Start Appium server as a persistent background process
      - name: Start Appium server
        working-directory: test-cases-reports/appium-test
        run: |
          mkdir -p reports
          nohup node_modules/.bin/appium > reports/appium.log 2>&1 &
          echo "APPIUM_PID=$!" >> $GITHUB_ENV
          echo "Waiting for Appium to be ready on port 4723..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
              echo "✅ Appium is ready!"
              break
            fi
            echo "  Attempt $i/30 — waiting 2s..."
            sleep 2
          done

      # 14. Run Appium tests inside Android Emulator
      - name: Run Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: bash -c "cd $GITHUB_WORKSPACE/test-cases-reports/appium-test && node_modules/.bin/wdio wdio.conf.js"

      # 15. Stop Appium server
      - name: Stop Appium server
        if: always()
        run: kill $APPIUM_PID 2>/dev/null || true

      # 16. Upload Appium Excel Report
      - name: Upload Appium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-excel-report
          path: test-cases-reports/appium-test/appium_android_report.xlsx
          if-no-files-found: ignore
          retention-days: 14

      # 17. Upload failure screenshots
      - name: Upload Appium failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-failure-screenshots
          path: test-cases-reports/appium-test/reports/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      # 18. Add chart and summary to GITHUB_STEP_SUMMARY
      - name: Generate Job Summary Chart
        if: always()
        run: |
          SUMMARY_JSON="test-cases-reports/appium-test/appium_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            TOTAL=$(jq -r '.total' "$SUMMARY_JSON")
            PASSED=$(jq -r '.passed' "$SUMMARY_JSON")
            FAILED=$(jq -r '.failed' "$SUMMARY_JSON")
            PASSRATE=$(jq -r '.passRate' "$SUMMARY_JSON")
            DURATION=$(jq -r '.duration' "$SUMMARY_JSON")
            STATUS=$(jq -r '.status' "$SUMMARY_JSON")
            
            echo "## 📊 Appium Mobile Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Pass vs Fail Rate ($PASSRATE%)" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed ✅\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed ❌\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Test Steps** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Steps Passed ✅** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Steps Failed ❌** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate 📈** | $PASSRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Duration ⏱️** | $DURATION |" >> $GITHUB_STEP_SUMMARY
            echo "| **Deployability Status 🚀** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Appium test summary JSON not found. Skip summary generation." >> $GITHUB_STEP_SUMMARY
          fi
