# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Standalone Baseline Load Testing Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Baseline Load Testing

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  load-test:
    name: Run Baseline Load Testing
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COLLABORATOR_TOKEN || secrets.GITHUB_TOKEN }}

      # 2. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Install Flutter dependencies (required for build)
      - name: flutter pub get
        run: flutter pub get

      # 6. Build Flutter Web
      - name: Build Flutter Web
        run: flutter build web --release --base-href /campus_mentor/ --dart-define=GROQ_KEY=${{ secrets.GROQ_API_KEY }}

      # 7. Install k6 (official Linux binary)
      - name: Install k6
        run: |
          curl -L -s -o k6.tar.gz https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-*/k6 /usr/local/bin/
          k6 version

      # 8. Set up Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: test-cases-reports/baseline Load testing/package-lock.json

      # 9. Install Node dependencies
      - name: Install Node dependencies
        working-directory: 'test-cases-reports/baseline Load testing'
        run: npm install --no-audit --no-fund

      # 10. Run Baseline Load Tests
      - name: Run Baseline Load Tests
        working-directory: 'test-cases-reports/baseline Load testing'
        run: node run_load_tests.js

      # 11. Upload Excel report
      - name: Upload Load Test Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-load-test-report
          path: test-cases-reports/baseline Load testing/baseline_load_test_report.xlsx
          if-no-files-found: ignore
          retention-days: 14

      # 12. Add chart and summary to GITHUB_STEP_SUMMARY
      - name: Generate Job Summary Chart
        if: always()
        run: |
          SUMMARY_JSON="test-cases-reports/baseline Load testing/load_test_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            TOTAL=$(jq -r '.total' "$SUMMARY_JSON")
            PASSED=$(jq -r '.passed' "$SUMMARY_JSON")
            FAILED=$(jq -r '.failed' "$SUMMARY_JSON")
            PASSRATE=$(jq -r '.passRate' "$SUMMARY_JSON")
            DURATION=$(jq -r '.duration' "$SUMMARY_JSON")
            STATUS=$(jq -r '.status' "$SUMMARY_JSON")
            
            echo "## 🚀 Baseline Load Testing Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Pass vs Fail Rate ($PASSRATE%)" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed ✅\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed ❌\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Requests** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests Passed ✅** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests Failed ❌** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate 📈** | $PASSRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Average Latency ⏱️** | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **Deployability Status 🚀** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Load testing summary JSON not found. Skip summary generation." >> $GITHUB_STEP_SUMMARY
          fi

      # 13. Configure Pages uploader
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 14. Package build/web as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    needs: load-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
