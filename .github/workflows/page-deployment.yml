# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Page deployment workflow
#
# Flutter is installed via git clone (stable branch) — no Node.js action,
# no Node 20 deprecation warnings. SDK is cached for speed.
# ─────────────────────────────────────────────────────────────────────────────
name: Page deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Set permissions for GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use collaborator token if available, otherwise fallback to GITHUB_TOKEN
          token: ${{ secrets.COLLABORATOR_TOKEN || secrets.GITHUB_TOKEN }}

      # Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: flutter pub get
        run: flutter pub get

      # Build for the GitHub Pages sub-path /campus_mentor/
      - name: Build Flutter Web for GitHub Pages
        run: flutter build web --release --base-href /campus_mentor/ --dart-define=GROQ_KEY=${{ secrets.GROQ_API_KEY }}

      # Configure Pages uploader
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Package build/web as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Option A: Standard deployment to repository pages (uses GITHUB_TOKEN)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Option B: Deployment using collaborator token (commented out by default)
      # Uncomment the step below and set up COLLABORATOR_TOKEN secret if you want to deploy using a collaborator PAT
      # - name: Deploy to Branch (Collaborator PAT fallback)
      #   if: always() && secrets.COLLABORATOR_TOKEN != ''
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.COLLABORATOR_TOKEN }}
      #     publish_dir: ./build/web
      #     user_name: 'github-actions[bot]'
      #     user_email: 'github-actions[bot]@users.noreply.github.com'
