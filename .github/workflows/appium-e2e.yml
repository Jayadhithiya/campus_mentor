# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Appium E2E Tests — Runs separately on push/PR to main, or manual run
#
# Launches an Android Emulator (KVM-accelerated) and executes the Appium 
# mobile test suite against the built debug APK.
# ─────────────────────────────────────────────────────────────────────────────
name: E2E — Appium Mobile Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  appium-mobile-e2e:
    name: Appium Mobile E2E Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Set up Java (required for Android SDK/Gradle and Emulator)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6. Install Flutter dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 7. Build Flutter Debug APK
      - name: Build Android Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # 8. Copy built APK to e2e_tests/appium_mobile_testing/apk/
      - name: Prepare APK directory for Appium
        run: |
          mkdir -p e2e_tests/appium_mobile_testing/apk
          cp build/app/outputs/flutter-apk/app-debug.apk e2e_tests/appium_mobile_testing/apk/app-debug.apk

      # 9. Enable KVM (Kernel-based Virtual Machine) for Emulator acceleration
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 10. Set up Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e_tests/appium_mobile_testing/package-lock.json

      # 11. Install npm packages for Appium test suite
      - name: Install Appium test dependencies
        working-directory: e2e_tests/appium_mobile_testing
        run: npm ci

      # 12. Install Appium UiAutomator2 driver (allow it to proceed if already installed)
      - name: Install Appium UIAutomator2 Driver
        working-directory: e2e_tests/appium_mobile_testing
        run: npx appium driver install uiautomator2 || true

      # 13. Run Appium tests inside Android Emulator
      - name: Run Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: cd e2e_tests/appium_mobile_testing && npm test

      # 14. Upload Appium Excel Report
      - name: Upload Appium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-excel-report
          path: |
            e2e_tests/appium_mobile_testing/reports/appium_android_test_report_final.xlsx
            reports/appium_test_reports/appium_android_test_report_final.xlsx
          if-no-files-found: ignore
          retention-days: 14

      # 15. Upload failure screenshots
      - name: Upload Appium failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-failure-screenshots
          path: e2e_tests/appium_mobile_testing/reports/screenshots/
          if-no-files-found: ignore
          retention-days: 7
