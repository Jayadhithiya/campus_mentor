# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Web App Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Web App
run-name: Deploy Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy-web-app:
    name: Build & Deploy Flutter Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file from secrets
        run: |
          echo "GROQ_KEY=${{ secrets.GROQ_KEY || secrets.GROQ_API_KEY }}" >> .env
          echo "FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}" >> .env
          echo "FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}" >> .env
          echo "FIREBASE_WEB_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release --dart-define=GROQ_KEY=${{ secrets.GROQ_KEY || secrets.GROQ_API_KEY }}

      - name: Check Firebase Credentials
        id: check_creds
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C }}
        run: |
          if [ -z "$FIREBASE_SECRET" ]; then
            echo "⚠️ WARNING: Firebase Service Account secret is not configured in GitHub Secrets."
            echo "Please set up FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C in your repository secrets to enable deployments."
            echo "has_secret=false" >> $GITHUB_OUTPUT
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Firebase Hosting
        if: steps.check_creds.outputs.has_secret == 'true'
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ env.FIREBASE_SECRET }}'
          projectId: campusmentor-2485c
          channelId: live
