# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Web App Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Web App
run-name: Deploy Web App

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  deploy-web-app:
    name: Build & Deploy Flutter Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release

      - name: Check Firebase Credentials
        id: check_creds
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C || secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SECRET" ]; then
            echo "⚠️ WARNING: Firebase Service Account secret is not configured in GitHub Secrets."
            echo "Please set up FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C in your repository secrets to enable deployments."
            echo "has_secret=false" >> $GITHUB_OUTPUT
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Firebase Hosting
        if: ${{ steps.check_creds.outputs.has_secret == 'true' }}
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPUSMENTOR_2485C || secrets.FIREBASE_SERVICE_ACCOUNT }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ env.FIREBASE_SECRET }}'
          projectId: campusmentor-2485c
          channelId: live
