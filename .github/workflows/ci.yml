# ─────────────────────────────────────────────────────────────────────────────
# CI Workflow — Runs on every push and pull request to main
#
# Flutter is installed via git clone (stable branch) — no Node.js action,
# no Node 20 deprecation warnings. SDK is cached for speed.
# ─────────────────────────────────────────────────────────────────────────────
name: CI — Flutter Build & Test

on:
  workflow_dispatch:

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  build-and-test:
    name: Analyze · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache Flutter SDK (keyed to stable channel + pubspec for invalidation)
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter via git clone (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH for all subsequent steps
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Confirm Flutter is available
      - name: Flutter version
        run: flutter --version

      # 6. Install Dart/Flutter packages
      - name: flutter pub get
        run: flutter pub get

      # 7. Static analysis — fails pipeline on errors
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      # 8. Run unit & widget tests
      - name: flutter test
        run: flutter test

      # 9. Build release APK
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 10. Upload APK as downloadable artifact (14-day retention)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # 11. Build Flutter Web for GitHub Pages
      - name: Build Flutter Web
        run: flutter build web --release --base-href /campus_mentor/ --dart-define=GROQ_KEY=${{ secrets.GROQ_API_KEY }}

      # 12. Upload web build (used by deploy job)
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: 1
