# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Workflow — GitHub Pages
#
# Flutter installed via git clone (stable). No Node.js actions used for
# Flutter setup → zero Node 20 deprecation warnings.
#
# ⚠️  REQUIRED: Settings → Pages → Source → "GitHub Actions"
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy — GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false


env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  # ── Job 1: Build Flutter Web ──────────────────────────────────────────────
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: flutter pub get
        run: flutter pub get

      # Build for the GitHub Pages sub-path /campus_mentor/
      - name: Build Flutter Web for GitHub Pages
        run: flutter build web --release --base-href /campus_mentor/

      # Configure Pages uploader
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Package build/web as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  # ── Job 2: Deploy to GitHub Pages ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
