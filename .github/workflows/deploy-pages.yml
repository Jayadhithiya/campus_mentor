# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Pages Deployment Workflow
# Builds the Flutter web app and deploys to:
#   https://jayadhithiya.github.io/campus_mentor/
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Install dependencies
      - name: flutter pub get
        run: flutter pub get

      # 6. Build Flutter Web
      #    --base-href must match the GitHub Pages sub-path /campus_mentor/
      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --base-href /campus_mentor/ \
            --dart-define=GROQ_KEY=${{ secrets.GROQ_API_KEY }}

      # 7. Configure GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 8. Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
