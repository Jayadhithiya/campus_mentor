# ─────────────────────────────────────────────────────────────────────────────
# Deploy Workflow — GitHub Pages
#
# Triggered on push to main only (not PRs).
# Uses direct shell Flutter install — no Node 20 action = no deprecation warnings.
#
# ⚠️  REQUIRED SETUP (already done):
#   Repository → Settings → Pages → Source → "GitHub Actions"
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy — GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'
  FLUTTER_HOME: ${{ github.workspace }}/.flutter

jobs:
  # ── Job 1: Build Flutter Web ──────────────────────────────────────────────
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-${{ env.FLUTTER_VERSION }}-linux

      # Install Flutter only on cache miss
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${{ env.FLUTTER_VERSION }}-stable.tar.xz \
            -o /tmp/flutter.tar.xz
          mkdir -p ${{ env.FLUTTER_HOME }}
          tar -xf /tmp/flutter.tar.xz -C ${{ env.FLUTTER_HOME }} --strip-components=1

      - name: Add Flutter to PATH
        run: echo "${{ env.FLUTTER_HOME }}/bin" >> $GITHUB_PATH

      - name: flutter pub get
        run: flutter pub get

      # Build for the GitHub Pages sub-path /campus_mentor/
      - name: Build Flutter Web for GitHub Pages
        run: flutter build web --release --base-href /campus_mentor/

      # Configure Pages uploader
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Package build/web as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  # ── Job 2: Deploy to GitHub Pages ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
