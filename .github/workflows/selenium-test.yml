# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ─────────────────────────────────────────────────────────────────────────────
# Standalone Selinium Test Workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Selinium Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_HOME: ${{ github.workspace }}/.flutter_sdk

jobs:
  selenium-test:
    name: Run Selinium Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COLLABORATOR_TOKEN || secrets.GITHUB_TOKEN }}

      # 2. Cache Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-stable-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            flutter-stable-${{ runner.os }}-

      # 3. Install Flutter (only on cache miss)
      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable \
            --depth 1 \
            "$FLUTTER_HOME"

      # 4. Add Flutter to PATH
      - name: Add Flutter to PATH
        run: echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      # 5. Install Flutter dependencies
      - name: flutter pub get
        run: flutter pub get

      # 6. Build Flutter Web (base-href=/ so local server serves it)
      - name: Build Flutter Web
        run: flutter build web --release --base-href /



      # 8. Set up Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: test-cases-reports/selinium-test/package-lock.json

      # 9. Install Selenium test dependencies
      - name: Install Selenium test dependencies
        working-directory: test-cases-reports/selinium-test
        run: npm ci

      # 10. Run Selenium E2E Web tests
      - name: Run Selenium E2E Web Tests
        working-directory: test-cases-reports/selinium-test
        run: node run_web_tests.js

      # 11. Upload Excel report
      - name: Upload Selenium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: test-cases-reports/selinium-test/selenium_web_report.xlsx
          if-no-files-found: ignore
          retention-days: 14

      # 12. Add chart and summary to GITHUB_STEP_SUMMARY
      - name: Generate Job Summary Chart
        if: always()
        run: |
          SUMMARY_JSON="test-cases-reports/selinium-test/selenium_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            TOTAL=$(jq -r '.total' "$SUMMARY_JSON")
            PASSED=$(jq -r '.passed' "$SUMMARY_JSON")
            FAILED=$(jq -r '.failed' "$SUMMARY_JSON")
            PASSRATE=$(jq -r '.passRate' "$SUMMARY_JSON")
            DURATION=$(jq -r '.duration' "$SUMMARY_JSON")
            STATUS=$(jq -r '.status' "$SUMMARY_JSON")
            
            echo "## 📊 Selenium Web Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Pass vs Fail Rate ($PASSRATE%)" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed ✅\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed ❌\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Test Steps** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Steps Passed ✅** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Steps Failed ❌** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate 📈** | $PASSRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Duration ⏱️** | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Deployability Status 🚀** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Selenium test summary JSON not found. Skip summary generation." >> $GITHUB_STEP_SUMMARY
          fi


